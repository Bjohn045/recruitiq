<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RecruitIQ — Select Your School</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Barlow', sans-serif;
  background: #0a0f1e;
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}

.logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 48px;
  font-weight: 900;
  letter-spacing: 1px;
  margin-bottom: 6px;
  text-align: center;
}
.logo span { color: #3b82f6; }

.tagline {
  font-size: 14px;
  color: #475569;
  text-align: center;
  margin-bottom: 52px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.card {
  background: #111827;
  border: 1px solid #1e2a3a;
  border-radius: 20px;
  padding: 40px 36px;
  width: 100%;
  max-width: 480px;
}

.card-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 24px;
  text-align: center;
}

.search-wrap {
  position: relative;
  margin-bottom: 16px;
}

#school-input {
  width: 100%;
  padding: 16px 18px;
  font-size: 17px;
  font-family: 'Barlow', sans-serif;
  font-weight: 500;
  background: #0f1f3d;
  border: 2px solid #1e2a3a;
  border-radius: 12px;
  color: white;
  outline: none;
  transition: border-color 0.2s;
}
#school-input::placeholder { color: #334155; }
#school-input:focus { border-color: #3b82f6; }

#school-dropdown {
  display: none;
  position: absolute;
  top: 100%; left: 0; right: 0;
  background: #111827;
  border: 1px solid #1e2a3a;
  border-radius: 12px;
  max-height: 240px;
  overflow-y: auto;
  z-index: 999;
  margin-top: 6px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}

.school-opt {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  cursor: pointer;
  border-bottom: 1px solid #1a2436;
  font-size: 15px;
  color: white;
  transition: background 0.1s;
}
.school-opt:last-child { border-bottom: none; }
.school-opt:hover { background: #0f1f3d; }

.div-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 5px;
  flex-shrink: 0;
}
.D1 { background: #7e22ce; color: white; }
.D2 { background: #1d4ed8; color: white; }
.D3 { background: #065f46; color: white; }
.NAIA { background: #c2410c; color: white; }
.JUCO { background: #92400e; color: white; }

/* Selected school pill */
#selected-pill {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  background: #0f1f3d;
  border: 2px solid #3b82f6;
  border-radius: 12px;
  margin-bottom: 16px;
}
#selected-pill.show { display: flex; }
#selected-school-name { font-size: 16px; font-weight: 600; flex: 1; }
.clear-btn {
  background: none; border: none; color: #475569;
  font-size: 22px; cursor: pointer; line-height: 1; padding: 0;
}
.clear-btn:hover { color: white; }

/* Division auto-detected */
#div-detected {
  display: none;
  text-align: center;
  margin-bottom: 20px;
  font-size: 13px;
  color: #64748b;
}
#div-detected.show { display: block; }
#div-detected strong { color: white; }

/* Enter button */
#enter-btn {
  display: none;
  width: 100%;
  padding: 18px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
#enter-btn.show { display: block; }
#enter-btn:hover { background: #2563eb; transform: translateY(-1px); }

.or-line {
  text-align: center;
  color: #334155;
  font-size: 12px;
  margin: 20px 0 0;
  text-transform: uppercase;
  letter-spacing: 1px;
}

@media (max-width: 540px) {
  .card { padding: 28px 20px; }
  .logo { font-size: 38px; }
}
</style>
</head>
<body>

<div class="logo">Recruit<span>IQ</span></div>
<div class="tagline">Built by a college coach, for the college coach</div>

<div class="card">
  <div class="card-title">Select Your School</div>

  <!-- Selected pill -->
  <div id="selected-pill">
    <span id="selected-school-name">Baldwin Wallace</span>
    <span id="selected-badge" class="div-badge D3">D3</span>
    <button class="clear-btn" onclick="clearSchool()">×</button>
  </div>

  <!-- Search input -->
  <div class="search-wrap" id="search-wrap">
    <input type="text" id="school-input"
      placeholder="Search your school..."
      autocomplete="off"
      oninput="onSearch(this.value)"
      onfocus="onFocus()"/>
    <div id="school-dropdown"></div>
  </div>

  <!-- Division detected -->
  <div id="div-detected">
    Evaluating as <strong id="div-label">D3</strong> &nbsp;·&nbsp; Benchmark: <strong id="bench-label">Emory (D3)</strong>
  </div>

  <!-- Enter button -->
  <button id="enter-btn" onclick="enterApp()">
    Enter RecruitIQ →
  </button>

  <div class="or-line">Your roster loads automatically</div>
</div>

let selectedSchool = null;
let filtered = [];

const BENCHMARKS = {
  D1: 'Duke (D1)',
  D2: 'Washburn (D2)',
  D3: 'Emory (D3)',
  NAIA: 'Emory (D3)',
  JUCO: 'Emory (D3)',
};

const DIV_COLORS = {D1:'#a855f7', D2:'#3b82f6', D3:'#10b981', NAIA:'#f97316', JUCO:'#eab308'};

function onSearch(val) {
  selectedSchool = null;
  document.getElementById('selected-pill').classList.remove('show');
  document.getElementById('search-wrap').style.display = '';
  document.getElementById('div-detected').classList.remove('show');
  document.getElementById('enter-btn').classList.remove('show');

  const q = val.trim().toLowerCase();
  if (q.length < 1) { closeDD(); return; }

  filtered = SCHOOLS.filter(s => s.n.toLowerCase().includes(q)).slice(0, 15);
  const dd = document.getElementById('school-dropdown');
  dd.innerHTML = filtered.map((s, i) =>
    `<div class="school-opt" onclick="selectSchool(${i})">
      <span>${s.n}</span>
      <span class="div-badge ${s.d}">${s.d}</span>
    </div>`
  ).join('');
  dd.style.display = filtered.length ? 'block' : 'none';
}

function onFocus() {
  const val = document.getElementById('school-input').value.trim();
  if (val && !selectedSchool) onSearch(val);
}

function selectSchool(i) {
  selectedSchool = filtered[i];
  closeDD();
  document.getElementById('school-input').value = '';
  document.getElementById('search-wrap').style.display = 'none';

  // Show pill
  const pill = document.getElementById('selected-pill');
  pill.classList.add('show');
  document.getElementById('selected-school-name').textContent = selectedSchool.n;
  const badge = document.getElementById('selected-badge');
  badge.textContent = selectedSchool.d;
  badge.className = 'div-badge ' + selectedSchool.d;

  // Show division detected
  const div = selectedSchool.d;
  const effectiveDiv = ['D1','D2','D3'].includes(div) ? div : 'D3';
  document.getElementById('div-label').textContent = div;
  document.getElementById('bench-label').textContent = BENCHMARKS[div] || BENCHMARKS.D3;
  document.getElementById('div-detected').classList.add('show');

  // Show enter button
  const btn = document.getElementById('enter-btn');
  btn.classList.add('show');
  btn.style.background = DIV_COLORS[div] || '#3b82f6';
}

function clearSchool() {
  selectedSchool = null;
  document.getElementById('selected-pill').classList.remove('show');
  document.getElementById('search-wrap').style.display = '';
  document.getElementById('school-input').value = '';
  document.getElementById('div-detected').classList.remove('show');
  document.getElementById('enter-btn').classList.remove('show');
  document.getElementById('school-input').focus();
}

function closeDD() {
  document.getElementById('school-dropdown').style.display = 'none';
}

function enterApp() {
  if (!selectedSchool) return;
  const div = selectedSchool.d;
  const effectiveDiv = ['D1','D2','D3'].includes(div) ? div : 'D3';
  const url = `app.html?school=${encodeURIComponent(selectedSchool.n)}&div=${encodeURIComponent(effectiveDiv)}&schoolDiv=${encodeURIComponent(div)}`;
  window.location.href = url;
}

document.addEventListener('click', e => {
  if (!e.target.closest('#search-wrap')) closeDD();
});

document.getElementById('school-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && filtered.length > 0) selectSchool(0);
});
</script>
